name: Fullstack CI/CD (Beginner)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Continuous Integration (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: API - Install dependencies
        working-directory: api
        run: npm ci

      - name: API - Run tests
        working-directory: api
        run: npm test

      - name: Frontend - Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend - Build
        working-directory: frontend
        run: npm run build

  cd:
    name: Continuous Delivery (CD)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Frontend - Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend - Build
        working-directory: frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy step placeholder
        run: |
          echo "CD step reached."
          echo "Replace this with real deploy commands."
          echo "Example targets: Render, Railway, Vercel, AWS, Azure."
